<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hospital Navigation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #1a5fa8 0%, #0d3d6e 100%); color: white; padding: 1.25rem 1rem 1rem; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .hospital-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header h1 { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .header .subtitle { font-size: 12px; opacity: 0.75; margin-top: 1px; }
  .you-are-here { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .you-are-here .pin { font-size: 16px; }
  .you-are-here .label { font-size: 11px; opacity: 0.8; }
  .you-are-here .location { font-size: 14px; font-weight: 500; }
  .screen { display: none; flex: 1; padding: 1rem; }
  .screen.active { display: block; }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #888; }
  .search-input { width: 100%; padding: 11px 12px 11px 36px; border: 1.5px solid #dde3ec; border-radius: 10px; font-size: 15px; background: #f7f9fc; color: #1a1a2e; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: #1a5fa8; background: #fff; }
  .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .dept-btn { background: #fff; border: 1.5px solid #e8edf5; border-radius: 12px; padding: 14px 12px; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
  .dept-btn:active, .dept-btn:hover { background: #f0f6ff; border-color: #1a5fa8; }
  .dept-btn .dept-icon { font-size: 24px; margin-bottom: 8px; display: block; }
  .dept-btn .dept-name { font-size: 14px; font-weight: 600; color: #1a1a2e; display: block; line-height: 1.3; }
  .dept-btn .dept-floor { font-size: 12px; color: #7a8499; margin-top: 4px; display: block; }
  .dept-btn .dept-time { font-size: 11px; color: #1a5fa8; background: #e8f0fb; border-radius: 4px; padding: 2px 6px; display: inline-block; margin-top: 6px; font-weight: 500; }
  .no-results { text-align: center; padding: 2rem; color: #888; font-size: 14px; grid-column: 1 / -1; }
  .dest-banner { background: linear-gradient(135deg, #1a7a45, #0f5530); color: white; border-radius: 12px; padding: 1rem; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .dest-banner .dest-icon { font-size: 28px; }
  .dest-banner h2 { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .dest-banner p { font-size: 12px; opacity: 0.8; margin-top: 3px; }
  .eta-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .eta-card { background: #f7f9fc; border: 1px solid #e8edf5; border-radius: 10px; padding: 10px; text-align: center; }
  .eta-card .val { font-size: 22px; font-weight: 700; color: #1a5fa8; line-height: 1; }
  .eta-card .unit { font-size: 11px; color: #888; margin-top: 4px; }
  .steps-list { list-style: none; }
  .step-item { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
  .step-bubble { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 1px; color: white; }
  .step-bubble.start { background: #1a5fa8; }
  .step-bubble.mid { background: #5a82c4; }
  .step-bubble.end { background: #1a7a45; }
  .step-connector { width: 2px; background: #dde3ec; margin: 0 14px; height: 14px; }
  .step-content { flex: 1; padding-top: 5px; }
  .step-content .step-text { font-size: 14px; color: #1a1a2e; line-height: 1.5; font-weight: 400; }
  .step-tag { display: inline-block; font-size: 11px; color: #5a6a8a; background: #eef1f8; border-radius: 4px; padding: 2px 8px; margin-top: 5px; }
  .back-btn { width: 100%; padding: 13px; border: 1.5px solid #dde3ec; border-radius: 10px; background: #fff; font-size: 15px; color: #5a6a8a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .back-btn:active, .back-btn:hover { background: #f0f4f8; }
  .back-arrow { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .back-arrow:active { background: rgba(255,255,255,0.35); }
  .footer { text-align: center; padding: 12px; font-size: 11px; color: #bbb; border-top: 1px solid #eee; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER: SELECT SCREEN -->
  <div class="header" id="header-select">
    <div class="header-top">
      <div class="hospital-logo">🏥</div>
      <div>
        <h1 id="hospital-name">PCMC PGI Yashwantrao Chavan Memorial Hospital</h1>
        <div class="subtitle">Indoor Navigation</div>
      </div>
    </div>
    <div class="you-are-here">
      <span class="pin">📍</span>
      <div>
        <div class="label">You are here</div>
        <div class="location" id="current-location-label">Hospital Entrance</div>
      </div>
    </div>
  </div>

  <!-- HEADER: DIRECTIONS SCREEN -->
  <div class="header" id="header-directions" style="display:none;">
    <div class="header-top">
      <button class="back-arrow" onclick="goBack()" aria-label="Go back">&#8592;</button>
      <div>
        <h1>Directions</h1>
        <div class="subtitle" id="dir-from-label">From: ...</div>
      </div>
    </div>
  </div>

  <!-- SCREEN: SELECT DESTINATION -->
  <div class="screen active" id="screen-select">
    <div class="section-label">Where do you want to go?</div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search department..." id="search-input" oninput="filterDepts(this.value)" autocomplete="off" />
    </div>
    <div class="dept-grid" id="dept-grid"></div>
  </div>

  <!-- SCREEN: DIRECTIONS -->
  <div class="screen" id="screen-directions">
    <div class="dest-banner">
      <span class="dest-icon" id="dir-dept-icon">🏥</span>
      <div>
        <h2 id="dir-dept-name">Department</h2>
        <p id="dir-dept-floor">Floor info</p>
      </div>
    </div>
    <div class="eta-row">
      <div class="eta-card"><div class="val" id="eta-time">3</div><div class="unit">min walk</div></div>
      <div class="eta-card"><div class="val" id="eta-dist">150</div><div class="unit">metres</div></div>
      <div class="eta-card"><div class="val" id="eta-floor">G</div><div class="unit">floor</div></div>
    </div>
    <div class="section-label">Step-by-step directions</div>
    <ol class="steps-list" id="steps-list"></ol>
    <button class="back-btn" onclick="goBack()">&#8592; Choose another destination</button>
  </div>

  <div class="footer" id="app-footer">&copy; PCMC PGI Yashwantrao Chavan Memorial Hospital</div>

</div>
<script>
const HOSPITAL_NAME = "PCMC PGI Yashwantrao Chavan Memorial Hospital";

const DEPARTMENTS = [
  {
    id: "emergency",
    name: "Emergency",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🚨",
    eta: 2,
    dist: 150,
    directions: {
      "default": [
        { text: "Take a left at the Yashwantrao Chavan Statue", tag: "Main corridor" },
        { text: "Walk straight until the very end", tag: "~50 metres" },
        { text: "Take a right and continue walking straight", tag: "Ground floor · CMO-50", final: true }
      ]
    }
  },
  {
    id: "pharmacy",
    name: "Pharmacy",
    floor: "Ground floor",
    floorCode: "G",
    icon: "💊",
    eta: 1,
    dist: 10,
    directions: {
      "default": [
        { text: "On your left of the Yashwantrao Chavan Statue", tag: "Pharmacy counter", final: true }
      ]
    }
  },
  {
    id: "radiology",
    name: "Radiology / X-Ray",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🩻",
    eta: 1,
    dist: 60,
    directions: {
      "default": [
        { text: "Walk straight from the Yashwantrao Chavan Statue", tag: "Destination will be on your Right", final: true }
      ]
    }
  },
  {
    id: "medicine-opd",
    name: "Medicine OPD",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🩺",
    eta: 1,
    dist: 50,
    directions: {
      "default": [
        { text: "Walk straight from the Yashwantrao Chavan Statue", tag: "Destination will be on your Left", final: true }
      ]
    }
  },
  {
    id: "lab",
    name: "Sample Collection",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🔬",
    eta: 1,
    dist: 30,
    directions: {
      "default": [
        { text: "Walk straight from the Yashwantrao Chavan Statue", tag: "Destination will be on your Right", final: true }
      ]
    }
  },
  {
    id: "billing",
    name: "Billing / Cashier",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🧾",
    eta: 2,
    dist: 130,
    directions: {
      "default": [
        { text: "Take a left at the Yashwantrao Chavan Statue", tag: "Main corridor" },
        { text: "Walk straight until the very end", tag: "~50 metres" },
        { text: "Take a right and continue walking straight", tag: "Destination will be on your Right · Billing-54", final: true }
      ]
    }
  },
  {
    id: "ortho",
    name: "Orthopaedics",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🦴",
    eta: 1,
    dist: 50,
    directions: {
      "default": [
        { text: "Take a left at the Yashwantrao Chavan Statue", tag: "Main corridor" },
        { text: "Walk straight for 20-30 metres", tag: "~20 metres" },
        { text: "Take a right", tag: "Destination will be on your Left", final: true }
      ]
    }
  },
  {
    id: "general-surgery",
    name: "General Surgery",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🫀",
    eta: 2,
    dist: 100,
    directions: {
      "default": [
        { text: "Take a left at the Yashwantrao Chavan Statue", tag: "Main corridor" },
        { text: "Walk straight until the very end", tag: "~50 metres" },
        { text: "Take a left", tag: "General Surgery", final: true }
      ]
    }
  },
  {
    id: "registration",
    name: "Registration Counter",
    floor: "Ground floor",
    floorCode: "G",
    icon: "📝",
    eta: 1,
    dist: 20,
    directions: {
      "default": [
        { text: "On your right of the Yashwantrao Chavan Statue", tag: "Registration Counter", final: true }
      ]
    }
  },
  {
    id: "opd-gynae",
    name: "Gynaecology OPD",
    floor: "Ground floor",
    floorCode: "G",
    icon: "🌸",
    eta: 2,
    dist: 120,
    directions: {
      "default": [
        { text: "Take a right at the Yashwantrao Chavan Statue", tag: "Main corridor" },
        { text: "Walk straight until the very end", tag: "~50 metres" },
        { text: "Take a right", tag: "Gynaecology & Family Planning OPD", final: true }
      ]
    }
  }
];

const SOURCE_LOCATIONS = {
  "opd-general":    "OPD — General Medicine",
  "opd-cardiology": "OPD — General Surgery",
  "opd-ortho":      "OPD — Orthopaedics",
  "opd-gynae":      "OPD — Gynaecology",
  "pharmacy":       "Pharmacy Counter",
  "billing":        "Billing / Cashier",
  "main-entrance":  "Main Entrance",
  "default":        "Hospital Entrance"
};

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const fromId = getParam("from") || "default";
const fromLabel = SOURCE_LOCATIONS[fromId] || SOURCE_LOCATIONS["default"];

document.getElementById("hospital-name").textContent = HOSPITAL_NAME;
document.getElementById("current-location-label").textContent = fromLabel;
document.getElementById("dir-from-label").textContent = "From: " + fromLabel;
document.title = HOSPITAL_NAME + " — Navigation";

let allDepts = [...DEPARTMENTS];

function renderGrid(list) {
  const grid = document.getElementById("dept-grid");
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">No departments found.<br>Try a different search.</div>';
    return;
  }
  grid.innerHTML = list.map(d => `
    <button class="dept-btn" onclick="showDirections('${d.id}')" aria-label="Go to ${d.name}">
      <span class="dept-icon">${d.icon}</span>
      <span class="dept-name">${d.name}</span>
      <span class="dept-floor">${d.floor}</span>
      <span class="dept-time">~${d.eta} min</span>
    </button>
  `).join("");
}

function filterDepts(q) {
  const lower = q.toLowerCase().trim();
  const filtered = lower
    ? allDepts.filter(d => d.name.toLowerCase().includes(lower) || d.floor.toLowerCase().includes(lower))
    : [...allDepts];
  renderGrid(filtered);
}

function showDirections(id) {
  const dept = allDepts.find(d => d.id === id);
  if (!dept) return;
  const steps = dept.directions[fromId] || dept.directions["default"] || [];

  document.getElementById("dir-dept-icon").textContent = dept.icon;
  document.getElementById("dir-dept-name").textContent = dept.name;
  document.getElementById("dir-dept-floor").textContent = dept.floor;
  document.getElementById("eta-time").textContent = dept.eta;
  document.getElementById("eta-dist").textContent = dept.dist;
  document.getElementById("eta-floor").textContent = dept.floorCode;

  document.getElementById("steps-list").innerHTML = steps.map((s, i) => {
    const bubbleClass = i === 0 ? "start" : (s.final ? "end" : "mid");
    return `
      <li class="step-item">
        <div class="step-bubble ${bubbleClass}">${i + 1}</div>
        <div class="step-content">
          <div class="step-text">${s.text}</div>
          ${s.tag ? `<span class="step-tag">${s.tag}</span>` : ""}
        </div>
      </li>
      ${!s.final ? '<div class="step-connector"></div>' : ''}
    `;
  }).join("");

  document.getElementById("header-select").style.display = "none";
  document.getElementById("header-directions").style.display = "block";
  document.getElementById("screen-select").classList.remove("active");
  document.getElementById("screen-directions").classList.add("active");
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById("header-directions").style.display = "none";
  document.getElementById("header-select").style.display = "block";
  document.getElementById("screen-directions").classList.remove("active");
  document.getElementById("screen-select").classList.add("active");
  window.scrollTo(0, 0);
}

renderGrid(allDepts);
</script>
</body>
</html>
