<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hospital Navigation Demo</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#0f766e;
    color:white;
    padding:15px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

.map{
    width:100%;
    border:1px solid #ccc;
}

.info{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
}

select,button{
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<div class="header">
<h2>🏥 District Hospital Navigation</h2>
</div>

<div class="container">

<div class="info">

<p>
📍 Current Location:
<b id="currentLocation"></b>
</p>

<select id="destination">
<option value="">Select Destination</option>
<option value="ICU">ICU</option>
<option value="Pharmacy">Pharmacy</option>
<option value="Billing">Billing</option>
<option value="Medicine OPD">Medicine OPD</option>
<option value="Ortho OPD">Ortho OPD</option>
</select>

<button onclick="showRoute()">Show Route</button>

</div>

<img src="floor1.png" class="map">

<div id="result"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const current =
params.get("from") || "Ortho OPD";

document.getElementById("currentLocation").innerText =
current;

function showRoute(){

let destination =
document.getElementById("destination").value;

if(destination===""){
alert("Select destination");
return;
}

document.getElementById("result").innerHTML = `
<div style="
background:white;
margin-top:20px;
padding:20px;
border-radius:8px;
">

<h3>Route</h3>

<p>
🟢 ${current}
</p>

<p>
⬇
</p>

<p>
🔵 Follow Main Corridor
</p>

<p>
⬇
</p>

<p>
🔴 ${destination}
</p>

</div>
`;
}

</script>

</body>
</html>
